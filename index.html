<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تنزيل التطبيق</title>

  <!-- أيقونة الموقع -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/888/888857.png">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 35px 25px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,.4);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0 0 25px;
      opacity: 0.9;
      line-height: 1.7;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      background: linear-gradient(135deg, #f9d423, #ffb347);
      color: #000;
      font-weight: bold;
      font-size: 20px;
      padding: 20px;
      border-radius: 14px;
      transition: all .25s ease;
      box-shadow: 0 10px 25px rgba(255, 180, 0, .35);
      animation: pulse 1.6s infinite;
    }

    .download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(255, 180, 0, .55);
    }

    .lang-en {
      display: none;
    }

    .lang-toggle {
      margin-top: 20px;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.8;
      text-decoration: underline;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 180, 0, 0.7);
      }
      70% {
        transform: scale(1.04);
        box-shadow: 0 0 0 20px rgba(255, 180, 0, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 180, 0, 0);
      }
    }

    footer {
      margin-top: 25px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="lang-ar">تنزيل التطبيق</h1>
    <h1 class="lang-en">Download Application</h1>

    <p class="lang-ar">
      اضغط على الزر بالأسفل لبدء تحميل التطبيق مباشرةً.
    </p>
    <p class="lang-en">
      Click the button below to download the application directly.
    </p>

    <a class="download-btn"
       href="https://dlll.apkm.app/instagold/10.50/InstaGold_Plus_v10.50.apk">
      <i class="fas fa-download"></i>
      <span class="lang-ar">تنزيل الآن</span>
      <span class="lang-en">Download Now</span>
    </a>

    <div class="lang-toggle" onclick="toggleLang()">
      English / العربية
    </div>

    <footer>
      © 2026 Mohammed Al-Tawaf
    </footer>
  </div>

  <script>
    let currentLang = "ar";

    function toggleLang() {
      const ar = document.querySelectorAll(".lang-ar");
      const en = document.querySelectorAll(".lang-en");

      if (currentLang === "ar") {
        ar.forEach(e => e.style.display = "none");
        en.forEach(e => e.style.display = "block");
        document.documentElement.lang = "en";
        document.documentElement.dir = "ltr";
        currentLang = "en";
      } else {
        en.forEach(e => e.style.display = "none");
        ar.forEach(e => e.style.display = "block");
        document.documentElement.lang = "ar";
        document.documentElement.dir = "rtl";
        currentLang = "ar";
      }
    }
  </script>

</body>
</html>
