<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تسجيل دخول - شبكة طواف نت</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --accent: #00f2ff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.glass-card {
    width: 92%;
    max-width: 380px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(25px);
    border-radius: 30px;
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 50px rgba(0,0,0,.6);
}

.header {
    text-align: center;
    margin-bottom: 15px;
}

.network-name {
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(to right, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.payment-pill {
    background: rgba(255,215,0,.08);
    border: 1px solid rgba(255,215,0,.2);
    padding: 6px 12px;
    border-radius: 50px;
    font-size: .7rem;
    color: #ffd700;
    text-align: center;
    margin-bottom: 15px;
}

/* ===== شريط إعلاني احترافي بدون اهتزاز ===== */
.ticker-wrapper {
    overflow: hidden;
    background: rgba(0,0,0,.4);
    border-radius: 6px;
    height: 28px;
    margin-bottom: 18px;
    border-right: 2px solid var(--accent);
}

.ticker-track {
    display: flex;
    width: max-content;
    animation: tickerMove 22s linear infinite;
}

.ticker-text {
    white-space: nowrap;
    font-size: .75rem;
    padding-left: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
}

@keyframes tickerMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

.highlight {
    color: var(--accent);
    font-weight: 700;
}

/* ===== الحقول ===== */
.input-group {
    margin-bottom: 12px;
    position: relative;
}

.custom-input,
.custom-select {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 12px;
    padding: 12px 40px 12px 15px;
    color: #fff;
    font-size: .95rem;
}

.field-icon {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    opacity: .4;
}

.login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--accent), #0072ff);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    margin: 10px 0 18px;
}

/* ===== صندوق توفير البيانات ===== */
.tools-box {
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.switch-text {
    font-size: .8rem;
}

.mini-switch {
    width: 36px;
    height: 20px;
    position: relative;
}

.mini-switch input {
    opacity: 0;
}

.slider {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 20px;
}

.slider:before {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    left: 3px;
    top: 3px;
    transition: .3s;
}

input:checked + .slider {
    background: var(--accent);
}

input:checked + .slider:before {
    transform: translateX(16px);
}

/* ===== قسم جديد أسفل توفير البيانات ===== */
.quick-links {
    background: rgba(0,0,0,.22);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 12px;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    margin-bottom: 15px;
}

.quick-item {
    background: rgba(255,255,255,.04);
    border-radius: 10px;
    padding: 10px 5px;
    text-align: center;
    font-size: .7rem;
    color: #ccc;
}

.quick-item i {
    display: block;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 5px;
}

.bottom-nav {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-top: 15px;
}

.bottom-nav i {
    font-size: 1.2rem;
    opacity: .6;
}

.footer-copy {
    text-align: center;
    font-size: .6rem;
    opacity: .3;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="glass-card">

<div class="header">
    <div class="network-name">TAWAF NET</div>
    <div style="font-size:.7rem;opacity:.6;">FUTURE CONNECTION</div>
</div>

<div class="payment-pill">
    الدفع متاح عبر: ون كاش • جوالي • كاش • جيب
</div>

<div class="ticker-wrapper">
    <div class="ticker-track">
        <div class="ticker-text">
            <i class="fas fa-wifi"></i> إنترنت منزلي <span class="highlight">مجاناً</span> |
            <i class="fas fa-headset"></i> دعم فني <span class="highlight">24 ساعة</span>
        </div>
        <div class="ticker-text">
            <i class="fas fa-tags"></i> عروض خاصة |
            <i class="fas fa-map-marker-alt"></i> نقاط بيع متعددة
        </div>
    </div>
</div>

<form>

<div class="input-group">
    <select class="custom-select">
        <option>2M - سرعة عالية</option>
        <option>4M - توربو</option>
        <option>1M - اقتصادية</option>
    </select>
    <i class="fas fa-gauge field-icon"></i>
</div>

<div class="input-group">
    <input class="custom-input" placeholder="رقم الكرت">
    <i class="fas fa-lock field-icon"></i>
</div>

<button class="login-btn">تسجيل الدخول</button>

<div class="tools-box">
    <span class="switch-text"><i class="fas fa-shield-alt"></i> توفير البيانات</span>
    <label class="mini-switch">
        <input type="checkbox" checked>
        <span class="slider"></span>
    </label>
</div>

<!-- القسم المطلوب -->
<div class="quick-links">
    <div class="quick-item">
        <i class="fas fa-map-marker-alt"></i>
        نقاط البيع
    </div>
    <div class="quick-item">
        <i class="fas fa-tags"></i>
        الأسعار
    </div>
    <div class="quick-item">
        <i class="fas fa-gift"></i>
        العروض
    </div>
</div>

</form>

<div class="bottom-nav">
    <i class="fab fa-whatsapp"></i>
    <i class="fas fa-phone"></i>
    <i class="fas fa-map"></i>
</div>

<div class="footer-copy">
    SYSTEM VERSION 3.0 • TAWAF NET
</div>

</div>

</body>
</html>
